            color: #00ff88;

        .form-group input {

            border-radius: 10px;
            background: rgba(255,255,255,0.05);

        .form-group input:focus {

        .form-group input::placeholder {

        .btn-submit {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #00ff88, #00d4aa);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            border-radius: 10px;
            margin-top: 20px;
        }

        .success-message.active {
            display: block;
            animation: slideIn 0.5s;
        }

        .success-message h2 {
            color: #00ff88;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .success-message p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .error-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(255, 51, 102, 0.2);
            border: 2px solid #ff3366;
            border-radius: 10px;
            margin-top: 20px;
        }

        .error-message.active {
            display: block;
            animation: slideIn 0.5s;
        }

        .info-box {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

            <div class="header-text">
                <h1>Vos, colocás fuelle en segundos?</h1>
                <p>Registrate para participar</p>
            </div>
        </div>

        <div style="text-align:right; font-size:0.7rem; opacity:0.4; margin-bottom:8px;">v2.39</div>

        <div class="form-container">
            <form id="registrationForm">
                <div class="form-group">
                    <label for="nombre_competidor">Nombre del competidor *</label>
                    <input type="text" id="nombre_competidor" name="nombre_competidor" placeholder="Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="nombre_negocio">Nombre del negocio <span style="opacity:0.6;font-weight:normal">(opcional)</span></label>
                    <input type="text" id="nombre_negocio" name="nombre_negocio" placeholder="Taller El Rápido">
                </div>

                <div class="form-group">
                    <label for="celular">Celular *</label>
                    <input type="tel" id="celular" name="celular" placeholder="1145678901" inputmode="numeric" required>
                </div>

                <div class="form-group">
                    <label for="comentario">Comentario <span style="opacity:0.6;font-weight:normal">(opcional)</span></label>
                    <input type="text" id="comentario" name="comentario" placeholder="Algo relevante...">
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">🏁 Registrarme</button>
            </form>

            <div class="success-message" id="successMessage">
                <h2>✅ ¡Registrado!</h2>
                <p>Ya estás en la cola para competir</p>
                <p style="margin-top: 10px; opacity: 0.7;">Acercate al stand cuando te llamen</p>
            </div>

            <div class="error-message" id="errorMessage">
                <h2>⚠️ Error</h2>
                <p id="errorText">Hubo un problema. Intentá de nuevo.</p>
            </div>
        </div>
    </div>

    <script>
        // URL de tu Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsUiYNRA5OVMwlvCwlPu5pqQJRAsUqXh-D-trBVFSsoCnh0A2KLnM8Hh4tTkPixO4C/exec';

        const form = document.getElementById('registrationForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const btnSubmit = document.getElementById('btnSubmit');

        // Generar ID único del dispositivo
        let dispositivoId = localStorage.getItem('griffo_dispositivo_id');
        let operadorNombre = localStorage.getItem('griffo_operador_nombre');
        
        if (!dispositivoId) {
            // Primera vez - generar ID único
            dispositivoId = 'CEL_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6).toUpperCase();
            localStorage.setItem('griffo_dispositivo_id', dispositivoId);
        }

        // Si no tiene nombre, pedirlo UNA SOLA VEZ
        if (!operadorNombre) {
            operadorNombre = prompt('👤 Primera vez en este celular\n\n¿Cuál es TU nombre?\n(Solo se pregunta una vez)');
            if (operadorNombre && operadorNombre.trim()) {
                operadorNombre = operadorNombre.trim();
                localStorage.setItem('griffo_operador_nombre', operadorNombre);
            } else {
                operadorNombre = 'Anónimo';
                localStorage.setItem('griffo_operador_nombre', operadorNombre);
            }
        }

        // Enviar formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre_competidor = document.getElementById('nombre_competidor').value.trim();
            const nombre_negocio = document.getElementById('nombre_negocio').value.trim();
            const celular = document.getElementById('celular').value.trim();
            const comentario = document.getElementById('comentario').value.trim();

            // Validar celular (mínimo 6 dígitos, solo números)
            if (!/^\d{6,15}$/.test(celular)) {
                errorText.textContent = 'Ingresá un número de celular válido (solo números)';
                errorMessage.classList.add('active');
                setTimeout(() => errorMessage.classList.remove('active'), 3000);
                return;
            }

            // Verificar si celular ya está registrado
            try {
                const checkResp = await fetch(SCRIPT_URL);
                const checkData = await checkResp.json();
                const yaExiste = checkData.some(r => String(r.celular) === String(celular));
                if (yaExiste) {
                    errorText.textContent = '⚠️ Este celular ya está registrado.';
                    errorMessage.classList.add('active');
                    setTimeout(() => errorMessage.classList.remove('active'), 4000);
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = '🏁 Registrarme';
                    return;
                }
            } catch(err) {}

            // Deshabilitar botón
            btnSubmit.disabled = true;
            btnSubmit.textContent = '⏳ Enviando...';

            try {
                let iframe = document.getElementById('hiddenFrame');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = 'hiddenFrame';
                    iframe.name = 'hiddenFrame';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }

                const tempForm = document.createElement('form');
                tempForm.action = SCRIPT_URL;
                tempForm.method = 'POST';
                tempForm.target = 'hiddenFrame';
                tempForm.style.display = 'none';

                const fields = {
                    nombre_competidor: nombre_competidor,
                    nombre_negocio: nombre_negocio,
                    celular: celular,
                    tiempo: '',
                    estado: 'registrado',
                    operador: operadorNombre,
                    dispositivo_id: dispositivoId,
                    comentario: comentario
                };

                for (const [key, value] of Object.entries(fields)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = value;
                    tempForm.appendChild(input);
                }

                document.body.appendChild(tempForm);
                tempForm.submit();

                // Limpiar formulario temporal
                setTimeout(() => {
                    if (document.body.contains(tempForm)) {
                        document.body.removeChild(tempForm);
                    }
                }, 1000);

                // Mostrar mensaje de éxito INMEDIATAMENTE
                form.style.display = 'none';
                successMessage.classList.add('active');

                // Reset después de 3 segundos
                setTimeout(() => {
                    form.reset();
                    form.style.display = 'block';
                    successMessage.classList.remove('active');
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = '🏁 Registrarme';
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'Error al registrar. Intentá de nuevo.';
                errorMessage.classList.add('active');
                setTimeout(() => errorMessage.classList.remove('active'), 3000);
                btnSubmit.disabled = false;
                btnSubmit.textContent = '🏁 Registrarme';
            }
        });
    </script>
